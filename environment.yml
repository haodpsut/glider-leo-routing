# Conda environment for GLIDER (RTX 4090 host).
#
#   conda env create -f environment.yml
#   conda activate glider
#
# PyTorch is installed from the pytorch/nvidia channels with a CUDA runtime, so no
# system CUDA toolkit is required, only a recent NVIDIA driver. If your driver is
# older than CUDA 12.1 requires, switch `pytorch-cuda` to 11.8.
name: glider

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.11

  # Deep learning (GPU build)
  - pytorch>=2.1
  - pytorch-cuda=12.1

  # Scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - pyyaml>=6.0
  - matplotlib>=3.7

  # Testing
  - pytest>=7.4
